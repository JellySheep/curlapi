services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: artem
      POSTGRES_PASSWORD: password
      POSTGRES_DB: curl_vulnerabilities
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    build: .
    volumes:
      - .:/app
    depends_on:
      - db
    # контейнер не должен упасть после старта
    command: tail -f /dev/null
    environment:
      DB_HOST: db
